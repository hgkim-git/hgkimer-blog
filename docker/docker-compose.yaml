services:
  db:
    image: mysql:8.0
    container_name: blog_mysql
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - mysql_data:/var/lib/mysql
    expose:
      - "3306"
    networks:
      - blog_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    container_name: blog_app
    restart: unless-stopped
    env_file: .env.prod
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - blog_network

volumes:
  mysql_data:

networks:
  blog_network:
    driver: bridge